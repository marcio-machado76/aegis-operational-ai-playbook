# CP10 — pipeline de avaliação contínua dos prompts (promptfoo em GitHub Actions).
# Decisões de gate (justificativa comparada em .github/workflows/JUSTIFICATIVA.md):
#   a1) só os asserts DETERMINÍSTICOS barram o build; o juiz LLM roda mas é informativo
#       (não-determinismo do juiz não deve reprovar um PR por flutuação).
#   b1) roda a SUÍTE INTEIRA a cada PR (suíte pequena; custo em centavos; simples e seguro).
#   C ) chaves em GitHub Secrets; gatilho em pull_request + execução manual (workflow_dispatch).
name: promptfoo

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # necessário para comentar o resultado no PR via issues.createComment

concurrency:
  group: promptfoo-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  promptfoo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PROMPTFOO_VERSION: 0.121.17
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Validar secrets obrigatórios
        run: |
          set -euo pipefail
          test -n "${OPENAI_API_KEY}" || { echo "Falta secret OPENAI_API_KEY"; exit 1; }

      # GATE — asserts determinísticos. Para aderir ao CP08 sem introduzir falso vermelho por
      # variação de provedor, o build bloqueia só no recorte OpenAI da suíte estruturada.
      - name: Suite deterministica OpenAI (barra o build)
        id: deterministic
        run: |
          set -euo pipefail
          for cfg in \
            devops/triagem-de-pods/promptfooconfig.yaml \
            devops/nota-de-triagem/promptfooconfig.yaml \
            devops/networkpolicy-sentinel/promptfooconfig.yaml; do
            echo "::group::promptfoo eval $cfg"
            # -j 1 (serial): reduz variação de latência e evita rajadas desnecessárias.
            npx --yes promptfoo@${PROMPTFOO_VERSION} eval -c "$cfg" --no-cache -j 1 \
              --filter-providers 'openai:'
            echo "::endgroup::"
          done

      # INFORMATIVO — gate de qualidade por LLM-as-judge. continue-on-error: NÃO derruba o build
      # (a1). Serve de sinal de qualidade no PR sem reprovar por flutuação do juiz.
      - name: Gate de qualidade LLM-as-judge (informativo)
        id: judge
        if: env.ANTHROPIC_API_KEY != ''
        continue-on-error: true
        run: |
          set -euo pipefail
          failed=0
          for cfg in \
            devops/causa-raiz/promptfooconfig.yaml \
            devops/estrategia-de-backpressure/promptfooconfig.yaml \
            devops/migracao-batch-para-streaming/promptfooconfig.yaml; do
            echo "::group::juiz (informativo) $cfg"
            if ! npx --yes promptfoo@${PROMPTFOO_VERSION} eval -c "$cfg" --no-cache -j 1; then
              failed=1
            fi
            echo "::endgroup::"
          done
          exit "$failed"

      # Comenta o resultado direto no PR (mesmo se o gate falhar — always()).
      - name: Comentar resultado no PR
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const det = '${{ steps.deterministic.outcome }}';
            const judge = '${{ steps.judge.outcome }}';
            const fmt = (outcome, labels) => {
              if (outcome === 'success') return labels.success;
              if (outcome === 'failure') return labels.failure;
              if (outcome === 'skipped' || !outcome) return labels.skipped;
              return outcome;
            };
            const body = [
              '### promptfoo — resultado da suíte',
              '',
              `- **Gate determinístico OpenAI (barra o build):** ${fmt(det, { success: '✅ passou', failure: '❌ falhou', skipped: '⏭️ não executado' })}`,
              `- **Juiz LLM (informativo):** ${fmt(judge, { success: '✅ executado', failure: '⚠️ falhou', skipped: '⏭️ pulado (sem secret ANTHROPIC_API_KEY)' })}`,
              '',
              '_Determinístico bloqueante:_ triagem-de-pods · nota-de-triagem · networkpolicy-sentinel.',
              '_Juiz (informativo):_ causa-raiz · estrategia-de-backpressure · migracao-batch-para-streaming.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
